<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gym AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
             Gym AI
        </h2>

<div class="mb-3">
            <label>Edad</label>
            <input type="number" id="edad" class="form-control" min="15">
        </div>

        <div class="mb-3">
            <label>Peso (kg)</label>
            <input type="number" id="peso" class="form-control" min="30">
        </div>

        <div class="mb-3">
            <label>Altura (cm)</label>
            <input type="number" id="altura" class="form-control" min="140">
        </div>

        <div class="mb-3">

            <label>Sexo</label>

            <select id="sexo" class="form-select">

                <option>Hombre</option>

                <option>Mujer</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Objetivo</label>

            <select id="objetivo" class="form-select">

                <option>Ganar músculo</option>

                <option>Bajar grasa</option>

                <option>Fuerza</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Nivel</label>

            <select id="nivel" class="form-select">

                <option>Principiante</option>

                <option>Intermedio</option>

                <option>Avanzado</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Días por semana</label>

            <select id="dias" class="form-select">

                <option>3</option>

                <option>4</option>

                <option>5</option>

                <option>6</option>

            </select>

        </div>

        <button class="btn btn-primary w-100" id="generar">

            Generar Rutina

        </button>

    </div>

    <div class="card mt-4 p-4 shadow">

        <h3>Resultado</h3>

        <div id="resultado">

            Aquí aparecerá la rutina.

        </div>

    </div>

</div>

<script type="module" src="src/script.js"></script>

</body>

</html>
